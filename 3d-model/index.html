<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Coastline Condos — 3D Model</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #0b1620; font-family: 'Segoe UI', Roboto, Arial, sans-serif; }
  #app { position: fixed; inset: 0; }
  canvas { display: block; touch-action: none; }

  #loading {
    position: fixed; inset: 0; background: #0b1620; color: #eae4d8;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 50; transition: opacity .6s ease;
  }
  #loading .spinner {
    width: 40px; height: 40px; border-radius: 50%;
    border: 3px solid rgba(234,228,216,0.15); border-top-color: #c9975f;
    animation: spin 1s linear infinite; margin-bottom: 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading.hidden { opacity: 0; pointer-events: none; }

  .hud {
    position: fixed; z-index: 10; color: #f2ede2;
    font-size: 13px; letter-spacing: .02em;
  }
  #title-card { top: 18px; left: 18px; max-width: 320px; }
  #title-card h1 {
    font-size: 17px; margin: 0 0 2px; font-weight: 600; letter-spacing: .04em;
    text-transform: uppercase;
  }
  #title-card p { margin: 0; opacity: .7; font-size: 12px; }

  #panel {
    bottom: 18px; left: 18px; right: 18px;
    display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between;
    gap: 10px;
  }
  .group { display: flex; gap: 8px; flex-wrap: wrap; background: rgba(15,22,30,0.55);
    backdrop-filter: blur(6px); padding: 8px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.08); }

  button.viewbtn {
    background: rgba(255,255,255,0.06); color: #f2ede2; border: 1px solid rgba(255,255,255,0.14);
    padding: 8px 12px; border-radius: 7px; font-size: 12.5px; cursor: pointer;
    transition: background .15s, transform .1s; white-space: nowrap;
  }
  button.viewbtn:hover { background: rgba(201,151,95,0.35); }
  button.viewbtn:active { transform: scale(0.96); }
  button.viewbtn.active { background: #c9975f; color: #1a1208; border-color: #c9975f; font-weight: 600; }

  #hint {
    position: fixed; top: 18px; right: 18px; z-index: 10; color: #f2ede2; opacity: .65;
    font-size: 12px; text-align: right; max-width: 220px;
  }

  #compass {
    position: fixed; z-index: 10; bottom: 90px; right: 18px; width: 54px; height: 54px;
    border-radius: 50%; border: 1px solid rgba(255,255,255,0.18); background: rgba(15,22,30,0.55);
    display: flex; align-items: center; justify-content: center; color: #c9975f; font-size: 11px; font-weight: 700;
  }

  #labels { position: fixed; inset: 0; z-index: 8; pointer-events: none; display: none; }
  .label3d {
    position: absolute; transform: translate(-50%, -120%);
    background: rgba(12,18,26,0.78); color: #f2ede2; border: 1px solid rgba(201,151,95,0.55);
    padding: 4px 9px; border-radius: 6px; font-size: 11.5px; letter-spacing: .03em; white-space: nowrap;
  }
  .label3d::after {
    content: ''; position: absolute; left: 50%; top: 100%; transform: translateX(-50%);
    border: 5px solid transparent; border-top-color: rgba(201,151,95,0.55);
  }

  #unit-card {
    position: fixed; z-index: 12; top: 84px; left: 18px; min-width: 210px; max-width: 260px;
    background: rgba(12,18,26,0.88); border: 1px solid rgba(201,151,95,0.55); border-radius: 12px;
    padding: 14px 16px; color: #f2ede2; backdrop-filter: blur(6px);
  }
  #unit-card h2 { margin: 0 0 2px; font-size: 20px; letter-spacing: .04em; color: #e8c894; }
  #unit-card p { margin: 3px 0; font-size: 12.5px; opacity: .85; }
  #uc-status {
    display: inline-block; margin-top: 8px; padding: 3px 10px; border-radius: 999px;
    font-size: 11px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase;
  }
  #uc-status.available { background: rgba(47,143,138,0.25); color: #7fd8cf; border: 1px solid #2f8f8a; }
  #uc-status.conditional { background: rgba(201,113,79,0.22); color: #eba985; border: 1px solid #c9714f; }
  #uc-status.sold { background: rgba(140,140,140,0.2); color: #b9b4a6; border: 1px solid #777; }
</style>
</head>
<body>
<div id="loading"><div class="spinner"></div><div>Reconstructing Coastline Condos…</div></div>
<div id="app"></div>

<div class="hud" id="title-card">
  <h1>Coastline Condos</h1>
  <p>Playas, Ecuador — interactive 3D reconstruction</p>
</div>
<div id="labels"></div>

<div class="hud" id="hint">Drag to orbit · Scroll to zoom · Right-drag to pan</div>
<div id="compass">N</div>

<div class="hud" id="panel">
  <div class="group" id="views">
    <button class="viewbtn" data-view="street">Street</button>
    <button class="viewbtn" data-view="front">Front Elevation</button>
    <button class="viewbtn" data-view="corner">Corner Unit</button>
    <button class="viewbtn" data-view="pool">Pool Court</button>
    <button class="viewbtn" data-view="terrace">302 Terrace</button>
    <button class="viewbtn" data-view="aerial">Aerial</button>
    <button class="viewbtn" data-view="orbit">Free Orbit</button>
  </div>
  <div class="group" id="lighting">
    <button class="viewbtn" data-light="overcast">Overcast</button>
    <button class="viewbtn" data-light="midday">Midday</button>
    <button class="viewbtn" data-light="sunset">Sunset</button>
    <button class="viewbtn" data-light="night">Night</button>
  </div>
  <div class="group" id="extras">
    <button class="viewbtn" id="btn-autorbit">Auto-Orbit</button>
    <button class="viewbtn" id="btn-walk">Walk Mode</button>
    <button class="viewbtn" id="btn-labels">Labels</button>
    <button class="viewbtn" id="btn-units" hidden>Units</button>
  </div>
</div>

<div id="unit-card" hidden>
  <h2 id="uc-id"></h2>
  <p id="uc-type"></p>
  <p id="uc-areas"></p>
  <p id="uc-price"></p>
  <span id="uc-status"></span>
</div>

<!-- Unit inventory (shared with the main site). 404s harmlessly when the
     folder is served standalone; the Units button then stays hidden. -->
<script src="../js/inventory.js"></script>

<!-- Same CDN as the main site explorer (jsDelivr). unpkg often hangs/blocks. -->
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module" src="./main.js"></script>
<script>
  // Failsafe: if the ES module never finishes, don't spin forever
  (function () {
    var el = document.getElementById('loading');
    if (!el) return;
    var done = function (msg) {
      if (msg) {
        el.innerHTML = '<div style="max-width:320px;text-align:center;padding:1rem;line-height:1.5">' +
          '<strong style="color:#e8c894">3D model could not start</strong><br><br>' +
          '<span style="opacity:.8;font-size:13px">' + msg + '</span><br><br>' +
          '<span style="opacity:.55;font-size:12px">Try hard-refresh (Ctrl+F5) or open this page outside the iframe.</span></div>';
      } else {
        el.classList.add('hidden');
      }
    };
    window.addEventListener('cc:model-ready', function () { done(null); });
    window.addEventListener('cc:model-error', function (e) {
      done((e && e.detail) || 'Unknown error loading Three.js');
    });
    window.addEventListener('unhandledrejection', function (e) {
      var m = (e.reason && (e.reason.message || String(e.reason))) || 'Module failed to load';
      done(m);
    });
    // Absolute last resort after 12s
    setTimeout(function () {
      if (!el.classList.contains('hidden') && el.textContent.indexOf('could not start') === -1) {
        done('Timed out waiting for WebGL / Three.js. Check network blocks on cdn.jsdelivr.net.');
      }
    }, 12000);
  })();
</script>
</body>
</html>
