<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Coastline Condos — 3D Model</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #0b1620; font-family: Poppins, 'Segoe UI', Roboto, Arial, sans-serif; }
  #app { position: fixed; inset: 0; }
  #title-card { position: fixed; top: 14px; left: 50%; transform: translateX(-50%); z-index: 10; color: #f2ede2; text-align: center; pointer-events: none; }
  #title-card h1 { font-size: 15px; margin: 0; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; }
  #title-card p { margin: 2px 0 0; opacity: .6; font-size: 11px; }
  #loading {
    position: fixed; inset: 0; background: #0b1620; color: #eae4d8;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 50; transition: opacity .6s ease;
  }
  #loading .spinner {
    width: 40px; height: 40px; border-radius: 50%;
    border: 3px solid rgba(234,228,216,0.15); border-top-color: #c9975f;
    animation: spin 1s linear infinite; margin-bottom: 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading.hidden { opacity: 0; pointer-events: none; }
</style>
<!-- Shared engine styles (HUD, walkthrough, joystick) come from the site stylesheet -->
<link rel="stylesheet" href="../css/site.min.css" />
</head>
<body>
<div id="loading"><div class="spinner"></div><div>Reconstructing Coastline Condos…</div></div>
<div id="app"></div>
<div id="title-card">
  <h1>Coastline Condos</h1>
  <p>Playas, Ecuador — interactive 3D reconstruction</p>
</div>

<!-- Unit inventory (shared with the main site). 404s harmlessly when the
     folder is served standalone; the Units overlay then stays hidden. -->
<script src="../js/inventory.js"></script>

<script type="importmap">
{
  "imports": {
    "three": "../vendor/three/three.module.js",
    "three/addons/": "../vendor/three/addons/"
  }
}
</script>
<script type="module">
  import { createCoastline3D } from '../js/coastline3d.js';
  const loading = document.getElementById('loading');
  try {
    const app = createCoastline3D(document.getElementById('app'), {
      hud: true,
      inventory: window.CC_INVENTORY || null,
      unitsOverlay: true,
    });
    app.on('ready', () => loading.classList.add('hidden'));
    // debug / automation handles (kept name-compatible with the old page)
    window.__app = app;
    window.__snap = (name) => app.snap(name);
  } catch (err) {
    loading.innerHTML = '<div style="max-width:320px;text-align:center;padding:1rem;line-height:1.5">' +
      '<strong style="color:#e8c894">3D model could not start</strong><br><br>' +
      '<span style="opacity:.8;font-size:13px">' + (err && err.message ? err.message : err) + '</span></div>';
  }
  setTimeout(() => {
    if (!loading.classList.contains('hidden') && loading.textContent.indexOf('could not start') === -1) {
      loading.classList.add('hidden');
    }
  }, 4000);
</script>
</body>
</html>
